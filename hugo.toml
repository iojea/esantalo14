title = "Análisis Numérico"
baseURL = "https://mate.dm.uba.ar/~esantalo14/"
theme = 'ananke' #["github.com/theNewDynamic/gohugo-theme-ananke/v2"]
resourceDir = "resources"
defaultContentLanguage = "es"
sectionPagesMenu = "main"
enableRobotsTXT = true


[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      
[services.googleAnalytics]
id = ''

[pagination]
pagerSize = 9 # this is set low for demonstrating with dummy content. Set to a higher number

[languages.es]
contentDir = "content/es"
languageCode = 'es-AR'
weight = 1
title = "Escuela CIMPA 2026"


[languages.en]
contentDir = "content/en"
languageCode = 'en-US'
#weight = 1
title = "CIMPA School 2026"
# languageDirection = 'rtl' for Right-To-Left languages

# [languages.fr]
# contentDir = "content/fr"
# languageCode = 'fr-FR'
# weight = 2
# title = "Ananke Fr"

[sitemap]
changefreq = "monthly"
priority = 0.5
filename = "sitemap.xml"

[params]
mainSections = []
text_color = ""
author = "" # default author, override via `author` in a posts front matter
favicon = ""
site_logo = "images/logo-cimpa.png"
description = ""
# choose a background color from any on this page: https://tachyons.io/docs/themes/skins/ and preface it with "bg-"
background_color_class = "bg-black"
# choose fitting and alignment styles for the featured image using Tachyons classes such as "cover|contain" for fitting and "bg-top|bg-center|bg-bottom" for alignment, or add any other class space-separated to customize further
featured_image_class = "cover bg-top"
# choose a color dimming class for the page or site header from any on this page: https://tachyons.io/docs/themes/skins/, preface it with "bg-" and add the value such as "-X0" where X is in [1,9]
cover_dimming_class = "bg-black-60"
recent_posts_number = 9
featured_image = "images/patioinfinito.jpg"
affil = "Universidad"


